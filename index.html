<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Chronoplast Records Official Site</h1>

    <div class="image-strip">
        <img src="pics/207.jpg" alt="Record 1">
        <img src="pics/928.jpg" alt="Record 2">
        <img src="pics/3094.jpg" alt="Record 3">
        <img src="pics/2746.jpg" alt="Record 4">
        <img src="pics/16395.jpg" alt="Record 5">
    </div>

    <p>Welcome to the official site of Chronoplast Records!</p>

    <div class="tabs">
      <div class="tab-row">
        <button class="tab active">Home</button>
        <a href="crypt.html" class="tab">Crypt</a>
        <a href="https://real-forum.onrender.com/forum.html" class="tab">Forum</a>
      </div>
    </div>

    <section class="auth-panel">
      <div class="auth-tabs">
        <button class="auth-switch active" data-mode="login">Login</button>
        <button class="auth-switch" data-mode="register">Register</button>
      </div>

      <form id="auth-form" class="auth-form">
        <div class="form-row">
          <label for="auth-email">Email</label>
          <input id="auth-email" type="email" required placeholder="you@example.com">
        </div>
        <div class="form-row">
          <label for="auth-password">Password</label>
          <input id="auth-password" type="password" required placeholder="Password">
        </div>
        <div class="form-row auth-confirm-row hidden">
          <label for="auth-confirm-password">Confirm password</label>
          <input id="auth-confirm-password" type="password" placeholder="Confirm password">
        </div>
        <button type="submit" class="auth-button">Login</button>
      </form>

      <div id="auth-message" class="auth-message"></div>

      <div id="welcome-panel" class="welcome-panel hidden">
        <p>Welcome, <span id="welcome-user"></span>!</p>
        <button id="logout-button" class="auth-button secondary">Logout</button>
      </div>
    </section>

    <script>
      window.addEventListener('load', () => {
        const strip = document.querySelector('.image-strip');
        if (strip) {
          const speed = 0.5;
          let position = 0;

          function animate() {
            const maxScroll = strip.scrollWidth - strip.clientWidth;
            if (maxScroll <= 0) return;
            position += speed;
            if (position >= maxScroll) {
              position = 0;
            }
            strip.scrollLeft = position;
            requestAnimationFrame(animate);
          }

          animate();
        }

        const authForm = document.getElementById('auth-form');
        const authMessage = document.getElementById('auth-message');
        const authSwitches = document.querySelectorAll('.auth-switch');
        const confirmRow = document.querySelector('.auth-confirm-row');
        const submitButton = authForm.querySelector('button[type="submit"]');
        const welcomePanel = document.getElementById('welcome-panel');
        const welcomeUser = document.getElementById('welcome-user');
        const logoutButton = document.getElementById('logout-button');

        const storageKey = 'chronoplastUsers';
        const sessionKey = 'chronoplastCurrentUser';

        function loadUsers() {
          return JSON.parse(localStorage.getItem(storageKey) || '{}');
        }

        function saveUsers(users) {
          localStorage.setItem(storageKey, JSON.stringify(users));
        }

        function setCurrentUser(email) {
          localStorage.setItem(sessionKey, email);
        }

        function clearCurrentUser() {
          localStorage.removeItem(sessionKey);
        }

        function getCurrentUser() {
          return localStorage.getItem(sessionKey);
        }

        function showMessage(text, type = 'info') {
          authMessage.textContent = text;
          authMessage.className = `auth-message ${type}`;
        }

        function showWelcome(email) {
          welcomeUser.textContent = email;
          welcomePanel.classList.remove('hidden');
          authForm.classList.add('hidden');
          document.querySelector('.auth-tabs').classList.add('hidden');
          authMessage.textContent = '';
        }

        function showAuthForm() {
          welcomePanel.classList.add('hidden');
          authForm.classList.remove('hidden');
          document.querySelector('.auth-tabs').classList.remove('hidden');
        }

        authSwitches.forEach(button => {
          button.addEventListener('click', () => {
            authSwitches.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            const mode = button.dataset.mode;
            if (mode === 'register') {
              confirmRow.classList.remove('hidden');
              submitButton.textContent = 'Create account';
            } else {
              confirmRow.classList.add('hidden');
              submitButton.textContent = 'Login';
            }
            authMessage.textContent = '';
          });
        });

        authForm.addEventListener('submit', event => {
          event.preventDefault();
          const email = document.getElementById('auth-email').value.trim().toLowerCase();
          const password = document.getElementById('auth-password').value;
          const confirmPassword = document.getElementById('auth-confirm-password').value;
          const activeMode = document.querySelector('.auth-switch.active').dataset.mode;
          const users = loadUsers();

          if (!email || !password) {
            showMessage('Please enter email and password.', 'error');
            return;
          }

          if (activeMode === 'register') {
            if (password !== confirmPassword) {
              showMessage('Passwords do not match.', 'error');
              return;
            }
            if (users[email]) {
              showMessage('This account already exists.', 'error');
              return;
            }
            users[email] = { password };
            saveUsers(users);
            setCurrentUser(email);
            showWelcome(email);
            showMessage('Account created and logged in!', 'success');
            authForm.reset();
            return;
          }

          if (!users[email] || users[email].password !== password) {
            showMessage('Invalid email or password.', 'error');
            return;
          }

          setCurrentUser(email);
          showWelcome(email);
          showMessage('Logged in successfully!', 'success');
          authForm.reset();
        });

        logoutButton.addEventListener('click', () => {
          clearCurrentUser();
          showAuthForm();
          showMessage('Logged out.', 'info');
        });

        const currentUser = getCurrentUser();
        if (currentUser) {
          showWelcome(currentUser);
        }
      });
      if (window.netlifyIdentity) {
  window.netlifyIdentity.on("init", user => {
    if (!user) {
      window.netlifyIdentity.on("login", () => {
        document.location.href = "/admin/"; // Redirect after login if needed
      });
    }
  });
}
    </script>
</body>
</html>
