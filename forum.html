<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronoplast Records Forum</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manufacturing+Consent&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Chronoplast Records Official Site</h1>

    <div class="image-strip">
        <img src="pics/207.jpg" alt="Record 1">
        <img src="pics/928.jpg" alt="Record 2">
        <img src="pics/3094.jpg" alt="Record 3">
        <img src="pics/2746.jpg" alt="Record 4">
        <img src="pics/16395.jpg" alt="Record 5">
    </div>

    <div class="tabs">
      <div class="tab-row">
        <a href="index.html" class="tab">Home</a>
        <a href="crypt.html" class="tab">crypt</a>
        <button class="tab active">Forum</button>
      </div>
    </div>
    <p>Community Forum</p>

    <div class="forum-container">
        <div id="threads-view">
            <div class="forum-header">
                <h2>Forum</h2>
            </div>

            <div class="new-thread-section">
                <h3>Start a New Thread</h3>
                <form id="new-thread-form">
                    <div class="form-row">
                        <label for="thread-author">Your name</label>
                        <input id="thread-author" type="text" required placeholder="Anonymous" maxlength="50">
                    </div>
                    <div class="form-row">
                        <label for="thread-title">Thread title</label>
                        <input id="thread-title" type="text" required placeholder="What's on your mind?" maxlength="100">
                    </div>
                    <div class="form-row">
                        <label for="thread-body">Message</label>
                        <textarea id="thread-body" required placeholder="Share your thoughts..."></textarea>
                    </div>
                    <button type="submit" class="submit-button">Post Thread</button>
                </form>
            </div>

            <div id="threads-container" class="threads-list">
                <div class="empty-state">Loading threads...</div>
            </div>
        </div>

        <div id="thread-detail-view" class="hidden">
            <button id="back-button" class="back-button">← Back to all threads</button>
            <div id="thread-detail-content"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Replace this with your Render URL once deployed (e.g., https://your-app.onrender.com)
        const API_URL = 'https://forum-02bp.onrender.com'; 

        // Autoscroll image strip
        window.addEventListener('load', () => {
            const strip = document.querySelector('.image-strip');
            if (strip) {
                const speed = 0.5;
                let position = 0;
                function animate() {
                    const maxScroll = strip.scrollWidth - strip.clientWidth;
                    if (maxScroll <= 0) return;
                    position += speed;
                    if (position >= maxScroll) position = 0;
                    strip.scrollLeft = position;
                    requestAnimationFrame(animate);
                }
                animate();
            }
        });

        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function renderThreadsList() {
            try {
                const response = await fetch(`${API_URL}/threads`);
                const threads = await response.json();
                const container = document.getElementById('threads-container');

                if (threads.length === 0) {
                    container.innerHTML = '<div class="empty-state">No threads yet. Be the first to start a discussion!</div>';
                    return;
                }

                container.innerHTML = threads
                    .slice().reverse()
                    .map(thread => `
                        <div class="thread" onclick="showThreadDetail('${thread.id}')">
                            <h3 class="thread-title">${escapeHtml(thread.title)}</h3>
                            <p class="thread-author">by ${escapeHtml(thread.author)}</p>
                            <p class="thread-preview">${escapeHtml(thread.body.substring(0, 150))}${thread.body.length > 150 ? '...' : ''}</p>
                            <div class="thread-meta">
                                <span>${thread.replies ? thread.replies.length : 0} replies</span>
                                <span>${formatTime(thread.timestamp)}</span>
                            </div>
                        </div>
                    `).join('');
            } catch (err) {
                console.error("Failed to load threads:", err);
            }
        }

        async function showThreadDetail(id) {
            const response = await fetch(`${API_URL}/threads`);
            const threads = await response.json();
            const thread = threads.find(t => t.id == id);

            const detailContent = document.getElementById('thread-detail-content');
            detailContent.innerHTML = `
            <div class="thread-detail">
                <h2>${escapeHtml(thread.title)}</h2>
                <p class="thread-author">by ${escapeHtml(thread.author)} • ${formatTime(thread.timestamp)}</p>
                <p class="thread-preview">${escapeHtml(thread.body)}</p>
                <div class="replies-section">
                    <h3>Replies (${thread.replies ? thread.replies.length : 0})</h3>
                    <div id="replies-container">
                        ${thread.replies && thread.replies.length > 0 ? 
                            thread.replies.map(reply => `
                                <div class="reply">
                                    <div class="reply-author">${escapeHtml(reply.author)}</div>
                                    <div class="reply-text">${escapeHtml(reply.text)}</div>
                                    <div class="reply-time">${formatTime(reply.timestamp)}</div>
                                </div>
                            `).join('') : '<div class="empty-state">No replies yet.</div>'}
                    </div>
                    <div class="reply-form">
                        <h3 style="color:red; font-family: 'Manufacturing Consent', sans-serif;">Reply</h3>
                        <form id="reply-form">
                            <div class="form-row">
                                <label for="reply-author">Your name</label>
                                <input id="reply-author" type="text" required placeholder="Anonymous" maxlength="50">
                            </div>
                            <div class="form-row">
                                <label for="reply-text">Your reply</label>
                                <textarea id="reply-text" required placeholder="Your response..."></textarea>
                            </div>
                            <button type="submit" class="submit-button">Post Reply</button>
                        </form>
                    </div>
                </div>
            </div>`;

            document.getElementById('threads-view').classList.add('hidden');
            document.getElementById('thread-detail-view').classList.remove('hidden');

            document.getElementById('reply-form').onsubmit = async (e) => {
                e.preventDefault();
                const replyData = {
                    author: document.getElementById('reply-author').value.trim() || 'Anonymous',
                    text: document.getElementById('reply-text').value.trim()
                };

                await fetch(`${API_URL}/threads/${id}/replies`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(replyData)
                });
                showThreadDetail(id);
            };
        }

        document.getElementById('new-thread-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const threadData = {
                author: document.getElementById('thread-author').value.trim() || 'Anonymous',
                title: document.getElementById('thread-title').value.trim(),
                body: document.getElementById('thread-body').value.trim()
            };

            await fetch(`${API_URL}/threads`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(threadData)
            });

            document.getElementById('new-thread-form').reset();
            renderThreadsList();
        });

        document.getElementById('back-button').onclick = () => {
            document.getElementById('thread-detail-view').classList.add('hidden');
            document.getElementById('threads-view').classList.remove('hidden');
            renderThreadsList();
        };

        renderThreadsList();
    </script>
</body>
</html>
